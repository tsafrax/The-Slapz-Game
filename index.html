<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Φάπα – Ξάπλα</title>
    <link rel="manifest" href="./manifest.json">
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            background-color: #fdf5e6;
            touch-action: none; /* Disables all browser gestures for faster slapping */
        }

        .game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        iframe { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            /* Making it 75px taller to push the badge off-screen */
            height: calc(100% + 75px); 
            border: none;
        }
    </style>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(function(err) {
                console.log("Service Worker Failed", err);
            });
        }
    </script>
</head>
<body>
    <div class="game-container">
        <iframe 
            src="https://theslapgame.base44.app" 
            allow="autoplay; fullscreen; gyroscope; accelerometer" 
            allowfullscreen>
        </iframe>
    </div>
</body>
</html>
