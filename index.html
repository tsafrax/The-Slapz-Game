<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Φάπα – Ξάπλα</title>

    <link rel="manifest" href="manifest.json">

    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #fdf5e6; 
            touch-action: manipulation;
        }
        /* Το "κόλπο" για να κρύψουμε το Base44 badge στο κάτω μέρος */
        .wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        iframe { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: calc(100% + 70px); /* Το κάνουμε λίγο πιο μακρύ για να βγει το badge εκτός οθόνης */
            border: none; 
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <iframe src="https://theslapgame.base44.app"></iframe>
    </div>
</body>
</html>
