<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Φάπα – Ξάπλα</title>
    <link href="https://fonts.googleapis.com/css?family=Bangers" rel="stylesheet">
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <div class="game-container">
        <h1 class="title">Φάπα – Ξάπλα</h1>
        
        <div class="avatar-stage">
            <h2 id="pop-text">POW!</h2>
            <div class="avatar-circle" onclick="triggerHit()">
                <img id="target-img" src="img/man.png" alt="Target">
            </div>
        </div>

        <div class="stats">
            <div>HITS: <span id="hits">0</span></div>
        </div>

        <button class="btn-reset" onclick="resetGame()">RESET</button>
    </div>

    <script type="module" src="game.js"></script>
</body>
</html>
